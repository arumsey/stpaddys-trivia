<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Top leaf -->
  <ellipse cx="50" cy="34" rx="16" ry="20" fill="#2d7a2d" transform="rotate(0 50 50)"/>
  <!-- Left leaf -->
  <ellipse cx="50" cy="34" rx="16" ry="20" fill="#2d7a2d" transform="rotate(120 50 50)"/>
  <!-- Right leaf -->
  <ellipse cx="50" cy="34" rx="16" ry="20" fill="#2d7a2d" transform="rotate(240 50 50)"/>
  <!-- Stem -->
  <rect x="47" y="55" width="6" height="22" rx="3" fill="#2d7a2d"/>
  <!-- Leaf vein highlights -->
  <ellipse cx="50" cy="34" rx="5" ry="16" fill="#4caf50" opacity="0.5" transform="rotate(0 50 50)"/>
  <ellipse cx="50" cy="34" rx="5" ry="16" fill="#4caf50" opacity="0.5" transform="rotate(120 50 50)"/>
  <ellipse cx="50" cy="34" rx="5" ry="16" fill="#4caf50" opacity="0.5" transform="rotate(240 50 50)"/>
</svg>
